[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
markers =
    unit: unit tests for isolated functions
    integration: integration tests for full pipelines
    slow: slow tests (requires downloads or heavy I/O)
